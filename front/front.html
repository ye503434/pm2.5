<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲林縣 - 智慧空氣品質監測戰情室</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #141414;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #888888;
            --color-good: #4caf50;
            --color-moderate: #ffeb3b;
            --color-unhealthy: #f44336;
            --color-temp: #ff5252;
            --color-pm25: #00bcd4;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background-color: var(--panel-bg); padding: 15px 20px; border-radius: 8px; border-left: 4px solid var(--color-pm25); }
        .title-area h2 { margin: 0; font-size: 20px; }
        .control-area select { background-color: #333; color: white; border: 1px solid #555; padding: 8px 15px; font-size: 16px; border-radius: 4px; outline: none; cursor: pointer; }
        /* 這裡稍微調整 header 的間距以容納三個方塊 */
        .header { display: flex; gap: 15px; margin-bottom: 20px; }
        .info-box { background-color: var(--panel-bg); padding: 20px; border-radius: 8px; flex: 1; text-align: center; border-top: 4px solid var(--text-muted); }
        .info-box h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; }
        .info-box p { margin: 0; font-size: 32px; font-weight: bold; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px;}
        .chart-container { background-color: var(--panel-bg); padding: 20px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .chart-title { font-size: 14px; color: var(--text-main); margin-bottom: 10px; }
        .canvas-wrapper { position: relative; height: 180px; width: 100%; display: flex; justify-content: center; }
        .center-value { position: absolute; bottom: 10px; font-size: 28px; font-weight: bold; }
        .history-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .history-container { background-color: var(--panel-bg); padding: 20px; border-radius: 8px; height: 300px;}
        .update-time { text-align: right; color: var(--text-muted); font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="title-area"><h2>雲林縣即時環境監測網 (Firebase 雲端版)</h2></div>
        <div class="control-area">
            <label for="station-select" style="margin-right: 10px; color: var(--text-muted);">選擇測站:</label>
            <select id="station-select">
                <option value="斗六">斗六 (Douliu)</option>
                <option value="崙背">崙背 (Lunbei)</option>
                <option value="臺西">臺西 (Taixi)</option>
                <option value="麥寮">麥寮 (Mailiao)</option>
            </select>
        </div>
    </div>

    <div class="header">
        <div class="info-box" id="status-box"><h3>系統狀態</h3><p id="system-status" style="color: var(--color-moderate)">連線中...</p></div>
        <div class="info-box" id="prediction-box" style="border-top-color: var(--color-pm25);"><h3>LSTM 預報 (下一小時)</h3><p id="prediction-val" style="color: var(--color-pm25)">--</p></div>
        <div class="info-box" id="aqi-box" style="border-top-color: var(--text-muted);"><h3>空氣品質 (AQI)</h3><p id="aqi-status">載入中...</p></div>
    </div>

    <div class="dashboard-grid">
        <div class="chart-container"><div class="chart-title">即時 PM2.5 (μg/m³)</div><div class="canvas-wrapper"><canvas id="pm25Chart"></canvas><div class="center-value" id="pm25-val">--</div></div></div>
        <div class="chart-container"><div class="chart-title">即時溫度 (°C)</div><div class="canvas-wrapper"><canvas id="tempChart"></canvas><div class="center-value" id="temp-val" style="color: var(--color-temp);">--</div></div></div>
        <div class="chart-container"><div class="chart-title">即時濕度 (%)</div><div class="canvas-wrapper"><canvas id="humChart"></canvas><div class="center-value" id="hum-val" style="color: #2196f3;">--</div></div></div>
    </div>

    <div class="history-grid">
        <div class="history-container"><canvas id="historyTempChart"></canvas></div>
        <div class="history-container"><canvas id="historyPm25Chart"></canvas></div>
    </div>

    <div class="update-time" id="last-update">最後更新時間: --</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGbxJznPUdovR-fw2zul35zhupfM9mOf0",
            authDomain: "air-quality-77209.firebaseapp.com",
            projectId: "air-quality-77209",
            storageBucket: "air-quality-77209.firebasestorage.app",
            messagingSenderId: "52021935333",
            appId: "1:52021935333:web:b61554913269cdf5e1a80c",
            measurementId: "G-90LJ8P5ZQC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let globalData = {};
        let currentStation = '斗六';

        Chart.defaults.color = '#888888';
        Chart.defaults.borderColor = '#333333';

        function createGaugeChart(canvasId, maxVal, color) {
            return new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['Value', 'Remaining'], datasets: [{ data: [0, maxVal], backgroundColor: [color, '#333333'], borderWidth: 0, circumference: 180, rotation: 270 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 500 } }
            });
        }

        function createLineChart(canvasId, labelName, lineColor, bgColor) {
            return new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: labelName, data: [], borderColor: lineColor, backgroundColor: bgColor, borderWidth: 2, fill: true, tension: 0.1, pointRadius: 0, pointHoverRadius: 4 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { color: '#ffffff' } } },
                    scales: { x: { grid: { display: true, color: '#333' }, ticks: { maxTicksLimit: 10 } }, y: { grid: { display: true, color: '#333' }, beginAtZero: false } },
                    interaction: { mode: 'index', intersect: false }
                }
            });
        }

        const charts = {
            pm25: createGaugeChart('pm25Chart', 100, 'var(--color-good)'),
            temp: createGaugeChart('tempChart', 50, 'var(--color-temp)'),
            hum: createGaugeChart('humChart', 100, '#2196f3'),
            historyTemp: createLineChart('historyTempChart', '過去五天溫度趨勢 (°C)', 'var(--color-temp)', 'rgba(255, 82, 82, 0.1)'),
            historyPm25: createLineChart('historyPm25Chart', '過去五天 PM2.5 趨勢 (μg/m³)', 'var(--color-pm25)', 'rgba(0, 220, 150, 0.1)')
        };

        function updateDashboardUI() {
            if (!globalData[currentStation]) return;
            const stationData = globalData[currentStation];
            const { pm25, temperature, humidity } = stationData.current;
            const history = stationData.history;

            // 🎯 新增：接收 Firebase 的預測 pm2.5 欄位 (prediction_lstm)
            const prediction = stationData.prediction_lstm;
            const predictionText = (prediction !== null && prediction !== undefined) ? parseFloat(prediction).toFixed(1) : "--";
            document.getElementById('prediction-val').innerText = predictionText + " μg/m³";

            let pm25Color = pm25 <= 35 ? 'var(--color-good)' : (pm25 <= 53 ? 'var(--color-moderate)' : 'var(--color-unhealthy)');
            charts.pm25.data.datasets[0].data = [pm25, 100 - pm25]; charts.pm25.data.datasets[0].backgroundColor[0] = pm25Color; charts.pm25.update();
            document.getElementById('pm25-val').innerText = pm25; document.getElementById('pm25-val').style.color = pm25Color;

            charts.temp.data.datasets[0].data = [temperature, 50 - temperature]; charts.temp.update(); document.getElementById('temp-val').innerText = temperature;
            charts.hum.data.datasets[0].data = [humidity, 100 - humidity]; charts.hum.update(); document.getElementById('hum-val').innerText = humidity;

            const aqiBox = document.getElementById('aqi-box'); const aqiStatus = document.getElementById('aqi-status');
            if(pm25 <= 35) { aqiStatus.innerText = '良好 (Good)'; aqiStatus.style.color = 'var(--color-good)'; aqiBox.style.borderTopColor = 'var(--color-good)';}
            else if(pm25 <= 53) { aqiStatus.innerText = '普通 (Moderate)'; aqiStatus.style.color = 'var(--color-moderate)'; aqiBox.style.borderTopColor = 'var(--color-moderate)';}
            else { aqiStatus.innerText = '不良 (Unhealthy)'; aqiStatus.style.color = 'var(--color-unhealthy)'; aqiBox.style.borderTopColor = 'var(--color-unhealthy)';}

            charts.historyTemp.data.labels = history.labels; charts.historyTemp.data.datasets[0].data = history.temperature; charts.historyTemp.update();
            charts.historyPm25.data.labels = history.labels; charts.historyPm25.data.datasets[0].data = history.pm25; charts.historyPm25.update();
        }

        document.getElementById('station-select').addEventListener('change', function(e) {
            currentStation = e.target.value;
            updateDashboardUI();
        });

        async function fetchFirebaseData() {
            try {
                const docRef = doc(db, "air_quality", "latest");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const result = docSnap.data();
                    globalData = result.stations_data;
                    updateDashboardUI();
                    
                    document.getElementById('system-status').innerText = 'Online (Firebase)';
                    document.getElementById('system-status').style.color = 'var(--color-good)';
                    document.getElementById('last-update').innerText = '最後更新時間: ' + result.update_time;
                } else {
                    throw new Error("找不到資料文件！");
                }
            } catch (error) {
                console.error('Firebase 讀取失敗:', error);
                document.getElementById('system-status').innerText = 'Offline';
                document.getElementById('system-status').style.color = 'var(--color-unhealthy)';
            }
        }

        fetchFirebaseData();
        setInterval(fetchFirebaseData, 5 * 60 * 1000); 
    </script>
</body>
</html>
