name: Hourly Air Quality Update

on:
  schedule:
    # 這裡代表每小時的 0 分執行 (UTC 時間)
    - cron: '0 * * * *'
  workflow_dispatch: # 讓我們可以在 GitHub 網頁上手動點擊執行測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv firebase-admin torch numpy scikit-learn

    - name: Create secrets files
      run: |
        # 從 GitHub Secrets 抓出內容並在雲端生成暫時檔案
        echo "${{ secrets.ENV_FILE }}" > .env
        echo '${{ secrets.FIREBASE_KEY_JSON }}' > firebase-key.json

    - name: Run update script
      run: python service/firebase.py
