name: Hourly Air Quality Update

on:
  schedule:
    # 這裡代表每小時的 0 分執行 (UTC 時間)
    - cron: '0 * * * *'
  workflow_dispatch: # 讓我們可以在 GitHub 網頁上手動點擊執行測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 強制安裝 CPU 版本的 PyTorch，避免 CI 流程因下載過大 CUDA 檔案而崩潰/超時
        pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
        # 安裝原本的套件，並加入 STGNN 所需的 torch_geometric, joblib 與 pandas
        pip install requests python-dotenv firebase-admin numpy scikit-learn torch_geometric joblib pandas

    - name: Create secrets files
      run: |
        # 從 GitHub Secrets 抓出內容並在雲端生成暫時檔案
        echo "${{ secrets.ENV_FILE }}" > .env
        echo '${{ secrets.FIREBASE_KEY_JSON }}' > firebase-key.json

    - name: Run update script
      run: python service/firebase.py